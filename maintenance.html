<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>תחזוקה | שמעון פרס 3</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --b:#1a6cf6;--bl:#4d9fff;--p:#7c3aed;--pl:#a78bfa;
  --bg:#020818;--t:#e8eeff;--d:#6b7fa8;
}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--bg);
  color:var(--t);font-family:'Rubik',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;}

body::before{content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 20% 20%,rgba(124,58,237,0.15) 0%,transparent 60%),
    radial-gradient(ellipse 50% 60% at 80% 80%,rgba(26,108,246,0.15) 0%,transparent 60%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(26,108,246,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(26,108,246,0.04) 1px,transparent 1px);
  background-size:50px 50px;}

.container{position:relative;z-index:1;text-align:center;padding:4vw;}

/* ICON */
.icon-wrap{position:relative;margin-bottom:4vh;}
.icon-ring{width:clamp(100px,14vw,180px);height:clamp(100px,14vw,180px);
  border-radius:50%;border:2px solid rgba(26,108,246,0.3);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto;position:relative;
  animation:ringPulse 3s ease-in-out infinite;}
@keyframes ringPulse{
  0%,100%{box-shadow:0 0 0 0 rgba(26,108,246,0.3),0 0 30px rgba(26,108,246,0.15);}
  50%{box-shadow:0 0 0 20px rgba(26,108,246,0),0 0 60px rgba(26,108,246,0.3);}
}
.icon-ring::before{content:'';position:absolute;inset:-8px;border-radius:50%;
  border:1px solid rgba(124,58,237,0.2);animation:spin 8s linear infinite;}
.icon-ring::after{content:'';position:absolute;inset:-16px;border-radius:50%;
  border:1px solid rgba(26,108,246,0.1);animation:spin 12s linear infinite reverse;}
@keyframes spin{to{transform:rotate(360deg);}}
.icon{font-size:clamp(2.5rem,5vw,5rem);animation:iconPulse 2s ease-in-out infinite alternate;}
@keyframes iconPulse{0%{filter:drop-shadow(0 0 8px rgba(26,108,246,0.5));}
  100%{filter:drop-shadow(0 0 20px rgba(124,58,237,0.7));}}

/* TITLE */
.title{font-size:clamp(1.8rem,4vw,4.5rem);font-weight:900;margin-bottom:1.5vh;
  background:linear-gradient(135deg,var(--bl),var(--pl));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  line-height:1.2;}
.subtitle{font-size:clamp(1rem,2vw,2rem);color:var(--d);margin-bottom:3vh;font-weight:400;}

/* BUILDING NAME */
.bldg{font-size:clamp(1.2rem,2.5vw,2.8rem);font-weight:700;color:var(--t);
  margin-bottom:.5vh;letter-spacing:.05em;}
.bldg-sub{font-size:clamp(.7rem,1.2vw,1.4rem);color:var(--d);}

/* DIVIDER */
.divider{width:clamp(80px,10vw,160px);height:1px;margin:3vh auto;
  background:linear-gradient(90deg,transparent,var(--b),var(--p),transparent);opacity:.6;}

/* STATUS */
.status-row{display:flex;align-items:center;justify-content:center;gap:.8vw;margin-bottom:2vh;}
.status-dot{width:10px;height:10px;border-radius:50%;background:#f59e0b;
  box-shadow:0 0 10px #f59e0b;animation:blink 1.5s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
.status-txt{font-size:clamp(.75rem,1.2vw,1.3rem);color:#f59e0b;font-weight:600;}

/* PROGRESS BAR */
.progress-wrap{width:clamp(200px,30vw,400px);margin:0 auto 2vh;
  background:rgba(255,255,255,.05);border-radius:20px;height:4px;overflow:hidden;
  border:1px solid rgba(26,108,246,.2);}
.progress-bar{height:100%;border-radius:20px;
  background:linear-gradient(90deg,var(--b),var(--p));
  animation:progress 3s ease-in-out infinite;}
@keyframes progress{
  0%{width:0%;margin-left:0;}
  50%{width:60%;margin-left:20%;}
  100%{width:0%;margin-left:100%;}
}

/* CLOCK */
.clock{font-size:clamp(1.5rem,3vw,3.5rem);font-weight:700;color:rgba(255,255,255,.15);
  font-variant-numeric:tabular-nums;margin-top:4vh;letter-spacing:.05em;}

/* DOTS */
.dots{display:flex;justify-content:center;gap:.5vw;margin-top:3vh;}
.dot{width:6px;height:6px;border-radius:50%;background:rgba(26,108,246,.4);
  animation:dotBounce .8s ease-in-out infinite;}
.dot:nth-child(2){animation-delay:.15s;}
.dot:nth-child(3){animation-delay:.3s;}
@keyframes dotBounce{0%,100%{transform:translateY(0);background:rgba(26,108,246,.4);}
  50%{transform:translateY(-6px);background:var(--bl);}}

/* REFRESH NOTE */
.refresh-note{position:fixed;bottom:3vh;font-size:clamp(.6rem,.9vw,1rem);
  color:rgba(255,255,255,.1);letter-spacing:.1em;}
</style>
</head>
<body>

<div class="container">

  <div class="icon-wrap">
    <div class="icon-ring">
      <div class="icon">🔧</div>
    </div>
  </div>

  <div class="bldg">שמעון פרס 3</div>
  <div class="bldg-sub">קריית מלאכי · לובי ראשי</div>

  <div class="divider"></div>

  <div class="title">המסך בתחזוקה</div>
  <div class="subtitle">נחזור בקרוב עם עדכונים חדשים</div>

  <div class="status-row">
    <div class="status-dot"></div>
    <div class="status-txt">עדכון מערכת בתהליך...</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="clock" id="clk"></div>
  <div style="display:flex;flex-direction:column;align-items:center;gap:.8vh;margin-top:1.5vh;">
    <div id="dateGreg" style="font-size:clamp(.7rem,1.1vw,1.3rem);color:rgba(255,255,255,.2);letter-spacing:.05em;"></div>
    <div id="dateHeb" style="font-size:clamp(.65rem,1vw,1.2rem);color:rgba(167,139,250,.25);letter-spacing:.05em;"></div>
    <div style="margin-top:.5vh;display:flex;align-items:center;gap:.5vw;">
      <div style="width:5px;height:5px;border-radius:50%;background:#f59e0b;opacity:.5;"></div>
      <div id="elapsed" style="font-size:clamp(.62rem,.95vw,1.1rem);color:rgba(245,158,11,.35);letter-spacing:.08em;"></div>
    </div>
  </div>

</div>



<script>
// Clock + elapsed + dates
const startTime=Date.now();
const MHE=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const DAYS=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

function fmtElapsed(sec){
  const totalMin=Math.floor(sec/60), s=sec%60;
  const totalH=Math.floor(totalMin/60), m=totalMin%60;
  const totalD=Math.floor(totalH/24), hh=totalH%24;
  const totalW=Math.floor(totalD/7), d=totalD%7;
  const parts=[];
  if(totalW===1) parts.push('שבוע');
  else if(totalW===2) parts.push('שבועיים');
  else if(totalW>2) parts.push(totalW+' שבועות');
  if(d===1) parts.push('יום');
  else if(d===2) parts.push('יומיים');
  else if(d>2) parts.push(d+' ימים');
  if(hh===1) parts.push('שעה');
  else if(hh===2) parts.push('שעתיים');
  else if(hh>2) parts.push(hh+' שעות');
  if(m===1) parts.push('דקה');
  else if(m===2) parts.push('שתי דקות');
  else if(m>2) parts.push(m+' דקות');
  if(s===1) parts.push('שנייה');
  else if(s===2) parts.push('שתי שניות');
  else if(s>0||parts.length===0) parts.push(s+' שניות');
  if(parts.length===1) return 'בתחזוקה כבר '+parts[0];
  const last=parts.pop();
  return 'בתחזוקה כבר '+parts.join(', ')+' ו-'+last;
}
function tick(){
  const n=new Date(),p=x=>String(x).padStart(2,'0');
  document.getElementById('clk').textContent=p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());
  document.getElementById('dateGreg').textContent='יום '+DAYS[n.getDay()]+' · '+n.getDate()+' '+MHE[n.getMonth()]+' '+n.getFullYear();
  const elapsed=Math.floor((Date.now()-startTime)/1000);
  document.getElementById('elapsed').textContent=fmtElapsed(elapsed);
}
setInterval(tick,1000);tick();

// Hebrew date via API
async function loadHebDate(){
  try{
    const n=new Date();
    const url='https://www.hebcal.com/converter?cfg=json&gy='+n.getFullYear()+'&gm='+(n.getMonth()+1)+'&gd='+n.getDate()+'&g2h=1';
    const r=await fetch(url,{cache:'no-store'});
    const d=await r.json();
    if(d.hebrew){document.getElementById('dateHeb').textContent=d.hebrew;return;}
  }catch(e){}
  // Retry
  setTimeout(loadHebDate,10000);
}
loadHebDate();

// Check if index.html is back every 30 seconds
const INDEX_URL='https://peres3.github.io/lobby/index.html';
async function checkIndex(){
  try{
    const r=await fetch(INDEX_URL+'?v='+Date.now(),{method:'HEAD',cache:'no-store'});
    if(r.ok){
      // index is back — go there!
      window.location.href=INDEX_URL+'?v='+Date.now();
    }
  }catch(e){}
}
// Check immediately and then every 30 seconds
setTimeout(checkIndex,5000);
setInterval(checkIndex,30000);
</script>
</body>
</html>
