<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>אבחון</title>
<style>
body{font-family:monospace;background:#07070f;color:#e8e8e8;padding:20px;font-size:14px;}
.ok{color:#4caf8a;} .err{color:#e53935;} .warn{color:#f5a623;}
h2{color:#c9a84c;margin:16px 0 8px;}
pre{background:rgba(255,255,255,.05);padding:10px;border-radius:8px;overflow-x:auto;font-size:12px;white-space:pre-wrap;word-break:break-all;}
button{background:#c9a84c;border:none;color:#000;padding:8px 16px;border-radius:8px;font-size:14px;cursor:pointer;margin:4px;}
</style>
</head>
<body>
<h1 style="color:#c9a84c;">🔍 דף אבחון — לובי</h1>

<h2>1. localStorage</h2>
<div id="lsTest"></div>

<h2>2. הודעות שמורות</h2>
<pre id="annsData"></pre>

<h2>3. הגדרות שמורות</h2>
<pre id="settingsData"></pre>

<h2>4. בדיקת רשת</h2>
<div id="netTest"></div>

<h2>5. כתובת דף זה</h2>
<pre id="urlInfo"></pre>

<h2>6. פעולות</h2>
<button onclick="writeTest()">כתוב localStorage</button>
<button onclick="readTest()">קרא localStorage</button>
<button onclick="clearAll()">נקה הכל</button>
<button onclick="location.reload()">רענן</button>
<div id="actionResult" style="margin-top:10px;color:#4caf8a;"></div>

<script>
const K = 'sp3_announcements';
const KS = 'sp3_settings';

// 1. localStorage test
try {
  localStorage.setItem('_test_', '1');
  const v = localStorage.getItem('_test_');
  localStorage.removeItem('_test_');
  document.getElementById('lsTest').innerHTML =
    v==='1' ? '<span class="ok">✅ localStorage עובד</span>' :
               '<span class="err">❌ localStorage לא עובד (קרא ערך שגוי)</span>';
} catch(e) {
  document.getElementById('lsTest').innerHTML =
    '<span class="err">❌ localStorage חסום: ' + e.message + '</span>';
}

// 2. Announcements
const anns = localStorage.getItem(K);
const annsEl = document.getElementById('annsData');
if (!anns) {
  annsEl.innerHTML = '<span class="warn">⚠️ אין הודעות ב-localStorage (המפתח sp3_announcements ריק)</span>';
} else {
  try {
    const parsed = JSON.parse(anns);
    annsEl.textContent = '✅ ' + parsed.length + ' הודעות:\n' + JSON.stringify(parsed, null, 2);
  } catch(e) {
    annsEl.textContent = '❌ שגיאת parse: ' + e.message + '\nערך גולמי: ' + anns.slice(0,200);
  }
}

// 3. Settings
const sets = localStorage.getItem(KS);
document.getElementById('settingsData').textContent =
  sets ? JSON.stringify(JSON.parse(sets), null, 2) : '⚠️ אין הגדרות שמורות';

// 4. Network
document.getElementById('netTest').innerHTML = '<span class="warn">⏳ בודק...</span>';
fetch('https://api.open-meteo.com/v1/forecast?latitude=31.73&longitude=34.74&current=temperature_2m')
  .then(r => r.json())
  .then(d => {
    document.getElementById('netTest').innerHTML =
      '<span class="ok">✅ רשת עובדת — טמפ: ' + d.current.temperature_2m + '°C</span>';
  })
  .catch(e => {
    document.getElementById('netTest').innerHTML =
      '<span class="err">❌ שגיאת רשת: ' + e.message + '</span>';
  });

// 5. URL
document.getElementById('urlInfo').textContent =
  'URL: ' + location.href + '\nOrigin: ' + location.origin + '\nProtocol: ' + location.protocol;

// All localStorage keys
const allKeys = Object.keys(localStorage);
document.getElementById('urlInfo').textContent +=
  '\n\nכל המפתחות ב-localStorage (' + allKeys.length + '):\n' + allKeys.join('\n') || '(ריק)';

// Actions
function writeTest() {
  localStorage.setItem(K, JSON.stringify([{title:'הודעת בדיקה',body:'זו הודעת בדיקה',active:true,dateFrom:'',dateTo:''}]));
  document.getElementById('actionResult').textContent = '✅ הודעת בדיקה נכתבה — רענן index.html';
}
function readTest() {
  const v = localStorage.getItem(K);
  document.getElementById('actionResult').textContent = v ? '✅ קרא: ' + v.slice(0,100) : '⚠️ ריק';
}
function clearAll() {
  if(confirm('למחוק הכל?')) { localStorage.clear(); location.reload(); }
}
</script>
</body>
</html>
