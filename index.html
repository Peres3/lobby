<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>לובי חכם | שמעון פרס 3</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --b:#1a6cf6;--bl:#4d9fff;--p:#7c3aed;--pl:#a78bfa;
  --bg:#020818;--t:#e8eeff;--d:#6b7fa8;--m:#9aabc8;
  --cb:rgba(26,108,246,0.22);--cp:rgba(124,58,237,0.22);
  --green:#10b981;--red:#ef4444;
  --cl:0.82fr;--cm:0.88fr;--cla:1.45fr;
}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--bg);color:var(--t);font-family:'Rubik',sans-serif;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 60% 40% at 10% 20%,rgba(124,58,237,0.14) 0%,transparent 60%),
             radial-gradient(ellipse 50% 50% at 90% 80%,rgba(26,108,246,0.14) 0%,transparent 60%);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(26,108,246,0.03) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(26,108,246,0.03) 1px,transparent 1px);
  background-size:40px 40px;}

/* SCREEN */
.screen{position:relative;z-index:1;width:100vw;height:100vh;
  display:grid;padding:8px 8px 5px;gap:4px;grid-template-rows:auto 1fr auto;}

/* TOP */
.top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;
  background:rgba(5,13,34,0.85);border:1px solid var(--cb);border-radius:11px;
  padding:5px 12px;backdrop-filter:blur(20px);position:relative;overflow:hidden;}
.top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--b),var(--p),transparent);opacity:.6;}
.d-heb{font-size:.65rem;font-weight:700;color:var(--pl);}
.d-greg{font-size:.55rem;color:var(--d);}
.clk{font-size:2rem;font-weight:700;color:#fff;letter-spacing:.04em;font-variant-numeric:tabular-nums;
  line-height:1;text-align:center;text-shadow:0 0 25px rgba(77,159,255,.7);
  animation:cp 2s ease-in-out infinite;}
@keyframes cp{0%,100%{text-shadow:0 0 25px rgba(77,159,255,.5);}50%{text-shadow:0 0 55px rgba(77,159,255,.9);}}
.colon{color:var(--bl);animation:blink 1s step-end infinite;}
@keyframes blink{50%{opacity:.1;}}
.dayname{font-size:.55rem;color:var(--bl);font-weight:600;letter-spacing:.12em;text-align:center;margin-top:1px;}
.bname{font-size:.65rem;font-weight:700;text-align:left;}
.bsub{font-size:.5rem;color:var(--d);text-align:left;}
.pill{display:inline-flex;align-items:center;gap:3px;background:rgba(16,185,129,0.1);
  border:1px solid rgba(16,185,129,0.3);border-radius:20px;padding:1px 6px;margin-top:2px;}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--green);
  box-shadow:0 0 4px var(--green);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.stext{font-size:.48rem;color:var(--green);}

/* MAIN GRID */
.main{display:grid;grid-template-columns:var(--cl) var(--cm) var(--cla);gap:5px;min-height:0;}

/* CARD */
.card{background:rgba(5,13,34,0.82);border-radius:10px;padding:6px 8px;
  position:relative;overflow:hidden;display:flex;flex-direction:column;}
.cb{border:1px solid var(--cb);}
.cb::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--b),transparent);}
.cp{border:1px solid var(--cp);}
.cp::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--p),transparent);}
.cm-card{border:1px solid rgba(100,80,220,0.3);}
.cm-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,var(--b),var(--p));}
.ct{font-size:.43rem;letter-spacing:.18em;text-transform:uppercase;font-weight:600;
  margin-bottom:4px;display:flex;align-items:center;gap:3px;flex-shrink:0;}
.ct.b{color:var(--bl);}
.ct.p{color:var(--pl);}
.ctd{width:4px;height:4px;border-radius:50%;background:currentColor;
  box-shadow:0 0 4px currentColor;flex-shrink:0;}
.ldmsg{display:flex;align-items:center;gap:5px;opacity:.5;padding:4px 0;}
.ldmsg span{font-size:.6rem;color:var(--d);}
.loader{width:8px;height:8px;border:1.5px solid rgba(26,108,246,.3);
  border-top-color:var(--bl);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* COLS */
.rcol,.mcol{display:flex;flex-direction:column;gap:4px;}

/* WEATHER */
.w-top{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.w-ico{font-size:1.5rem;filter:drop-shadow(0 0 6px rgba(77,159,255,.5));}
.w-temp{font-size:1.5rem;font-weight:700;color:#fff;line-height:1;}
.w-temp sup{font-size:38%;color:var(--bl);}
.w-desc{font-size:.52rem;color:var(--d);}
.w-dets{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:3px;}
.wd{font-size:.46rem;color:var(--d);}
.wd strong{color:var(--m);}
.chart-wrap{width:100%;height:32px;margin-bottom:3px;}
.fc{display:flex;justify-content:space-between;align-items:center;
  background:rgba(26,108,246,0.06);border:1px solid rgba(26,108,246,0.1);
  border-radius:5px;padding:2px 5px;margin-bottom:2px;}
.fcd{font-size:.46rem;color:var(--d);}
.fce{font-size:.7rem;}
.fch{color:var(--bl);font-weight:700;font-size:.46rem;}
.fcl{color:var(--d);font-size:.46rem;}

/* QR */
.qr-row{display:flex;align-items:center;gap:7px;}
.qrw{width:40px;height:40px;background:#fff;border-radius:6px;padding:2px;
  box-shadow:0 0 12px rgba(26,108,246,.4);flex-shrink:0;}
.qrw img{width:100%;height:100%;object-fit:contain;}
.qrt{font-size:.58rem;font-weight:700;margin-bottom:1px;}
.qrs{font-size:.46rem;color:var(--d);line-height:1.3;}

/* TIMES */
.tg{display:grid;gap:3px;width:100%;}
.tg.c1{grid-template-columns:1fr;}
.tg.c2{grid-template-columns:1fr 1fr;}
.tg.c3{grid-template-columns:1fr 1fr 1fr;}
.tg.c4{grid-template-columns:1fr 1fr;}
.tg.c5{grid-template-columns:1fr 1fr 1fr;}
.tg.c6{grid-template-columns:1fr 1fr 1fr;}
.tg.c7{grid-template-columns:1fr 1fr 1fr 1fr;}
/* last item spans to fill if odd */
.tg.c5 .ti:last-child{grid-column:2/4;}
.ti{background:rgba(26,108,246,0.07);border:1px solid rgba(26,108,246,0.12);
  border-radius:5px;padding:3px 2px;text-align:center;}
.tl{font-size:.38rem;color:var(--d);margin-bottom:1px;white-space:nowrap;line-height:1.2;}
.tv{font-size:.65rem;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;}

/* PARASHA */
.pname{font-size:1rem;font-weight:900;color:#fff;line-height:1;text-shadow:0 0 15px rgba(167,139,250,.5);}
.pspec{font-size:.52rem;color:var(--pl);font-weight:600;margin-top:1px;}
.crow{display:flex;align-items:center;gap:4px;margin-top:4px;}
.cico{font-size:.8rem;animation:flicker 1.8s ease-in-out infinite alternate;}
@keyframes flicker{0%{filter:drop-shadow(0 0 3px #ffaa00);}100%{filter:drop-shadow(0 0 8px #ff7700);}}
.clbl{font-size:.55rem;font-weight:700;color:var(--pl);}
.cdate{font-size:.42rem;color:var(--d);}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;margin-top:3px;}
.sbox,.hbox{border-radius:5px;padding:3px 2px;text-align:center;}
.sbox{background:rgba(124,58,237,0.1);border:1px solid rgba(124,58,237,0.22);}
.hbox{background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.18);}
.slbl,.hlbl{font-size:.36rem;color:var(--d);margin-bottom:1px;line-height:1.2;}
.sval,.hval{font-size:.65rem;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;}
.hname{font-size:.58rem;font-weight:700;color:var(--pl);}
.hwhen{font-size:.43rem;color:var(--d);margin:1px 0 3px;}

/* ANNOUNCEMENTS */
.aitem{background:rgba(26,108,246,0.08);border:1px solid rgba(26,108,246,0.2);
  border-radius:7px;padding:5px 7px;margin-bottom:3px;border-right:2px solid var(--b);}
.aitem.p{border-right-color:var(--p);background:rgba(124,58,237,0.08);border-color:rgba(124,58,237,0.18);}
.aimg-ann{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:6px;margin-bottom:4px;
  border:1px solid rgba(26,108,246,.15);}
.at{font-size:.62rem;font-weight:700;color:#fff;margin-bottom:2px;}
.ab{font-size:.5rem;color:var(--m);line-height:1.4;}
.adots{display:flex;justify-content:center;gap:4px;margin-top:3px;flex-shrink:0;}
.adot{width:4px;height:4px;border-radius:50%;background:rgba(26,108,246,.3);}
.adot.act{background:var(--b);box-shadow:0 0 5px var(--b);}
.aempty{font-size:.55rem;color:var(--d);text-align:center;padding:8px 0;opacity:.6;}

/* GALLERY */
.gal-inner{flex:1;min-height:0;border-radius:7px;overflow:hidden;position:relative;
  background:#111;border:1px solid var(--cb);}
.gal-inner img{width:100%;height:100%;object-fit:cover;transition:transform 1s ease;}
.gal-overlay{position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,rgba(2,8,24,.85));padding:4px 6px;}
.gal-cap{font-size:.45rem;color:rgba(255,255,255,.7);}
.gal-dots{display:flex;gap:3px;margin-top:2px;}
.gdot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.3);}
.gdot.act{background:#fff;}

/* YOUTUBE IN SLOT */
.yt-slot{flex-shrink:0;border-radius:10px;overflow:hidden;background:#000;
  border:1px solid rgba(26,108,246,0.45);
  box-shadow:0 0 25px rgba(26,108,246,0.3),0 8px 32px rgba(0,0,0,.6);}
.yt-handle{background:rgba(5,13,34,0.95);padding:4px 8px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(26,108,246,0.25);}
.yt-title{font-size:.48rem;color:var(--bl);font-weight:700;letter-spacing:.05em;}
.yt-badge{font-size:.42rem;background:linear-gradient(135deg,var(--b),var(--p));
  color:#fff;padding:2px 7px;border-radius:8px;font-weight:700;}
.yt-body{position:relative;width:100%;padding-bottom:56.25%;}
.yt-body iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block;}

/* LEFT COL */
.lcol{display:flex;flex-direction:column;gap:4px;min-height:0;}

/* OVERLAYS */
#sleepOv{display:none;position:fixed;inset:0;background:#000;z-index:9000;
  flex-direction:column;align-items:center;justify-content:center;gap:1vh;}
#slpClk{font-size:clamp(5rem,14vw,16rem);font-weight:700;color:rgba(255,255,255,.55);
  font-variant-numeric:tabular-nums;line-height:1;
  text-shadow:0 0 60px rgba(26,108,246,.4);}
#slpDate{font-size:clamp(1.2rem,3vw,3.5rem);font-weight:600;color:rgba(255,255,255,.28);
  letter-spacing:.12em;}
#slpHeb{font-size:clamp(.9rem,2vw,2.5rem);font-weight:400;color:rgba(167,139,250,.25);
  letter-spacing:.08em;}
#emergOv{display:none;position:fixed;inset:0;background:rgba(170,0,0,.97);z-index:9100;
  flex-direction:column;align-items:center;justify-content:center;padding:4vw;text-align:center;}
.e-ico{font-size:clamp(3rem,8vw,9rem);animation:ep 1s ease-in-out infinite;}
@keyframes ep{0%,100%{transform:scale(1);}50%{transform:scale(1.12);}}
#etit{font-size:clamp(1.8rem,4vw,5rem);font-weight:900;color:#fff;margin-bottom:2vh;line-height:1.2;}
#ebod{font-size:clamp(1rem,2.2vw,2.8rem);color:rgba(255,255,255,.85);line-height:1.5;max-width:80vw;}
#maintOv{display:none;position:fixed;inset:0;background:rgba(7,7,15,.97);z-index:9050;
  flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:2vh;}

/* TICKER */
.ticker{background:rgba(5,13,34,0.9);border:1px solid var(--cb);border-radius:7px;
  display:flex;align-items:center;overflow:hidden;height:20px;flex-shrink:0;}
.tlbl{flex-shrink:0;background:linear-gradient(135deg,var(--b),var(--p));
  color:#fff;font-weight:700;font-size:.47rem;padding:0 8px;height:100%;
  display:flex;align-items:center;white-space:nowrap;}
.tinner{white-space:nowrap;font-size:.47rem;color:var(--m);padding:0 8px;will-change:transform;}
</style>
</head>
<body>

<!-- OVERLAYS -->
<div id="sleepOv">
  <div id="slpClk"></div>
  <div id="slpDate"></div>
  <div id="slpHeb"></div>
</div>
<div id="emergOv"><div class="e-ico">🚨</div><div id="etit"></div><div id="ebod"></div></div>
<div id="maintOv">
  <div style="font-size:3rem;">🔧</div>
  <div style="font-size:clamp(1.5rem,3vw,4rem);font-weight:900;color:var(--bl);">המסך בתחזוקה</div>
  <div id="mntMsg" style="font-size:clamp(.8rem,1.5vw,1.8rem);color:var(--d);"></div>
</div>

<div class="screen" id="mainScreen">
  <!-- TOP -->
  <div class="top">
    <div>
      <div class="d-heb" id="dateHeb">--</div>
      <div class="d-greg" id="dateGreg">--</div>
    </div>
    <div>
      <div class="clk" id="clock">00<span class="colon">:</span>00<span class="colon">:</span>00</div>
      <div class="dayname" id="dayName">--</div>
    </div>
    <div style="text-align:left;">
      <div class="bname" id="bldgName">שמעון פרס 3</div>
      <div class="bsub">קריית מלאכי · לובי</div>
      <div class="pill"><div class="sdot" id="sdot"></div><span class="stxt" id="stxt">מתחבר...</span></div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main" id="mainGrid">

    <!-- RIGHT: weather + quote/homefront -->
    <div class="rcol">
      <div class="card cb" style="flex:2;min-height:0;">
        <div class="ct b"><span class="ctd"></span>מזג אוויר</div>
        <div id="wContent"><div class="ldmsg"><div class="loader"></div><span>טוען...</span></div></div>
        <div id="wAlert"></div>
      </div>
      <!-- Quote card (always visible) -->
      <div class="card cb" id="quoteCard" style="flex:1;min-height:0;display:flex;flex-direction:column;">
        <div class="ct b"><span class="ctd"></span>ציטוט היום</div>
        <div id="quoteContent" style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:2px;"></div>
      </div>
      <!-- Homefront card (shown only if enabled & has images) -->
      <div class="card cb" id="hfCard" style="flex-shrink:0;display:none;flex-direction:column;padding:5px;">
        <div class="ct b"><span class="ctd"></span>פיקוד העורף</div>
        <div id="hfImgWrap" style="width:100%;border-radius:6px;overflow:hidden;background:transparent;">
          <img id="hfImg" src="" style="width:100%;height:auto;display:block;border-radius:6px;"
            onerror="this.style.display='none'"
            onload="this.style.display='block'">
        </div>
        <div id="hfDots" style="display:flex;justify-content:center;gap:3px;margin-top:3px;"></div>
      </div>
    </div>

    <!-- MID: times + parasha + hagim -->
    <div class="mcol">
      <div class="card cb">
        <div class="ct b"><span class="ctd"></span>זמני היום</div>
        <div id="tContent"><div class="ldmsg"><div class="loader"></div><span>טוען...</span></div></div>
      </div>
      <div class="card cp" style="flex:1;">
        <div class="ct p"><span class="ctd"></span>פרשת השבוע</div>
        <div id="pContent"><div class="ldmsg"><div class="loader"></div><span>טוען...</span></div></div>
      </div>
      <div class="card cm-card" id="hagimCard" style="display:none;">
        <div class="ct p"><span class="ctd"></span>חגים וזמנים</div>
        <div id="hagimContent"></div>
      </div>
    </div>

    <!-- LEFT: anns (flex:1) + gallery (if on) + yt (if on) + qr (always bottom) -->
    <div class="lcol" id="lcol">
      <!-- Announcements — always shown, takes remaining space -->
      <div class="card cb" id="annCard" style="flex:1;min-height:0;">
        <div class="ct b"><span class="ctd"></span>הודעות לדיירים</div>
        <div id="annScroll" style="flex:1;overflow:hidden;min-height:0;">
          <div class="ldmsg"><div class="loader"></div><span>טוען...</span></div>
        </div>
        <div class="adots" id="adots"></div>
      </div>
      <!-- Gallery — shown if enabled, above YouTube -->
      <div id="slotGal" class="card cb" style="flex-shrink:0;display:none;">
        <div class="ct b"><span class="ctd"></span>תמונות הבניין</div>
        <div class="gal-inner" id="galInner" style="aspect-ratio:16/9;border-radius:7px;overflow:hidden;position:relative;background:#111;border:1px solid var(--cb);">
          <img id="galImg" src="" alt="" style="width:100%;height:100%;object-fit:cover;">
          <div class="gal-overlay">
            <div class="gal-cap" id="galCap"></div>
            <div class="gal-dots" id="galDots"></div>
          </div>
        </div>
      </div>
      <!-- YouTube — always at bottom above QR, shown if enabled -->
      <div id="slotYT" class="yt-slot" style="display:none;">
        <div class="yt-handle">
          <span class="yt-title">▶ YouTube</span>
          <span class="yt-badge" id="ytBadge">📺 סרטון</span>
        </div>
        <div class="yt-body">
          <iframe id="ytFrame" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
      </div>
      <!-- QR always at very bottom -->
      <div class="card cb" style="flex-shrink:0;">
        <div class="qr-row">
          <div class="qrw"><img id="qrImg2" src="" alt="QR"></div>
          <div><div class="qrt">📱 קבוצת ווצאפ</div><div class="qrs">סרקו להצטרפות לקבוצת הדיירים</div></div>
        </div>
      </div>
    </div>

  </div>

  <!-- TICKER -->
  <div class="ticker" id="ticker">
    <div class="tlbl">📰 חדשות</div>
    <div style="flex:1;overflow:hidden;height:100%;display:flex;align-items:center;">
      <div class="tinner" id="tInner">טוען חדשות...</div>
    </div>
  </div>
</div>

<script>
'use strict';
const $=id=>document.getElementById(id);
const safeGet=k=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):null;}catch(e){return null;}};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const pad=n=>String(n).padStart(2,'0');

// ── CONSTANTS ──────────────────────────────────────────
const DAYS=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const MHE=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const GH_RAW='https://raw.githubusercontent.com/peres3/lobby/main/settings.json';
const K={anns:'sp3_announcements',settings:'sp3_settings',music:'sp3_music',
  sleep:'sp3_sleep',emergency:'sp3_emergency',design:'sp3_design',
  building:'sp3_building',gallery:'sp3_gallery',content:'sp3_content',widgets:'sp3_widgets'};

// ── CLOCK ──────────────────────────────────────────────
function tick(){
  const n=new Date();
  $('clock').innerHTML=pad(n.getHours())+'<span class="colon">:</span>'+pad(n.getMinutes())+'<span class="colon">:</span>'+pad(n.getSeconds());
  $('dayName').textContent='יום '+DAYS[n.getDay()];
  $('dateGreg').textContent=n.getDate()+' '+MHE[n.getMonth()]+' '+n.getFullYear();
}
setInterval(tick,1000);tick();

// ── SETTINGS ───────────────────────────────────────────
function isLight(hex){
  try{const c=(hex||'').replace('#','');
    return(parseInt(c.substr(0,2),16)*299+parseInt(c.substr(2,2),16)*587+parseInt(c.substr(4,2),16)*114)/1000>128;
  }catch(e){return false;}
}
function applySettings(){
  const s=safeGet(K.settings)||{}, d=safeGet(K.design)||{}, r=document.documentElement;
  const gold=d.gold||'#1a6cf6', bg=d.bg||'#020818', text=d.text||'#e8eeff';
  r.style.setProperty('--b',gold);
  r.style.setProperty('--bg',bg);
  r.style.setProperty('--t',text);
  const il=isLight(bg);
  r.style.setProperty('--cb',il?'rgba(0,0,0,0.15)':'rgba(26,108,246,0.22)');

const ANNOUNCEMENTS=[

];

let aItems=[],aIdx=0,aTimer=null;
function parseDt(s){
  if(!s) return null;
  if(s.includes('-')){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
  const p=s.split('/');if(p.length<3) return null;
  const y=p[2].length===2?2000+parseInt(p[2]):parseInt(p[2]);
  return new Date(y,parseInt(p[1])-1,parseInt(p[0]));
}
function loadAnns(){
  const now=new Date(),today=new Date(now);today.setHours(0,0,0,0);
  const nm=now.getHours()*60+now.getMinutes();
  const stored=safeGet(K.anns)||[];
  const source=stored.length>0?stored:ANNOUNCEMENTS;
  const active=source.filter(a=>{
    if(!a.active) return false;
    if(a.dateFrom){const d=parseDt(a.dateFrom);if(d&&today<d) return false;}
    if(a.dateTo){const d=parseDt(a.dateTo);if(d){d.setHours(23,59,59);if(now>d) return false;}}
    if(a.timeFrom){const[h,m]=a.timeFrom.split(':').map(Number);if(nm<h*60+m) return false;}
    if(a.timeTo){const[h,m]=a.timeTo.split(':').map(Number);if(nm>h*60+m) return false;}
    return true;
  });
  const sc=$('annScroll'),ad=$('adots');
  if(!sc) return;
  if(!active.length){
    sc.innerHTML='<div class="aempty">אין הודעות להצגה</div>';
    if(ad) ad.innerHTML='';return;
  }
  aItems=active;aIdx=0;
  sc.innerHTML=aItems.map((a,i)=>`<div class="aitem${i===0?' act':''}">
    ${a.img?`<img class="aimg-ann" src="${esc(a.img)}" onerror="this.style.display='none'">` :''}
    <div class="at">${esc(a.title)}</div>
    ${a.body?`<div class="ab">${esc(a.body)}</div>`:''}</div>`).join('');
  if(ad) ad.innerHTML=aItems.map((_,i)=>`<div class="adot${i===0?' act':''}"></div>`).join('');
  if(aTimer) clearInterval(aTimer);
  if(aItems.length>1) aTimer=setInterval(scrollAnn,5000);
}
function scrollAnn(){
  if(!aItems.length) return;
  aIdx=(aIdx+1)%aItems.length;
  const sc=$('annScroll');if(!sc) return;
  const its=sc.querySelectorAll('.aitem');
  its.forEach((el,i)=>el.classList.toggle('act',i===aIdx));
  const h=its[0]?its[0].offsetHeight+4:0;
  sc.style.transform=`translateY(-${Math.min(aIdx*h,sc.scrollHeight-sc.clientHeight)}px)`;
  document.querySelectorAll('.adot').forEach((d,i)=>d.classList.toggle('act',i===aIdx));
}

const WC={0:'☀️|בהיר',1:'🌤️|בהיר',2:'⛅|מעונן חלקית',3:'☁️|מעונן',
  45:'🌫️|ערפל',61:'🌧️|גשם',63:'🌧️|גשם',65:'🌧️|גשם כבד',
  80:'🌦️|מטר',81:'🌧️|מטר',95:'⛈️|סופת רעמים',99:'⛈️|סופה'};
function drawChart(temps){
  if(!temps||!temps.length) return '';
  const W=200,H=32,pl=2,pr=2,pt=4,pb=4,iW=W-pl-pr,iH=H-pt-pb;
  const mn=Math.min(...temps)-1,mx=Math.max(...temps)+1;
  const x=i=>pl+i*(iW/(temps.length-1));
  const y=v=>pt+iH-(v-mn)/(mx-mn)*iH;
  let path=`M ${x(0)} ${y(temps[0])}`;
  for(let i=1;i<temps.length;i++){const cx=(x(i-1)+x(i))/2;path+=` C ${cx} ${y(temps[i-1])},${cx} ${y(temps[i])},${x(i)} ${y(temps[i])}`;}
  const poly=`${pl},${pt+iH} `+temps.map((t,i)=>`${x(i)},${y(t)}`).join(' ')+` ${x(temps.length-1)},${pt+iH}`;
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">
    <defs><linearGradient id="wg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a6cf6" stop-opacity=".3"/><stop offset="100%" stop-color="#1a6cf6" stop-opacity="0"/></linearGradient></defs>
    <polygon points="${poly}" fill="url(#wg)"/>
    <path d="${path}" fill="none" stroke="#4d9fff" stroke-width="1.5" stroke-linecap="round"/>
  </svg>`;
}

// ── HEBCAL ──────────────────────────────────────────────
let cachedHeb='';
const _hc={};
async function hebFor(d){
  const k=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  if(_hc[k]) return _hc[k];
  try{const r=await(await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${d.getFullYear()}&gm=${d.getMonth()+1}&gd=${d.getDate()}&g2h=1`)).json();_hc[k]=r.hebrew||'';return _hc[k];}catch(e){return '';}
}
async function fetchHebcal(){
  const s=safeGet(K.settings)||{};
  const[lat,lon]=(s.weatherCity||'31.7318,34.7430').split(',');
  try{
    const now=new Date();
    const cv=await(await fetch(`https://www.hebcal.com/converter?cfg=json&gy=${now.getFullYear()}&gm=${now.getMonth()+1}&gd=${now.getDate()}&g2h=1`)).json();
    if(cv.hebrew){$('dateHeb').textContent=cv.hebrew;cachedHeb=cv.hebrew;}
    // Zmanim
    const zm=await(await fetch(`https://www.hebcal.com/zmanim?cfg=json&latitude=${lat}&longitude=${lon}&tzid=Asia/Jerusalem&sec=1`)).json();
    const z=zm.times;
    const s2=safeGet('sp3_settings')||{};
    const zc=s2.zmanimConfig||{};
    const def={alot:true,sunrise:true,sofKriat:true,chatzot:true,mincha:false,sunset:true,tzeit:true};
    const allItems=[
      {key:'alot',      l:'עלות השחר',  v:z.alotHaShachar},
      {key:'sunrise',   l:'הנץ החמה',   v:z.sunrise},
      {key:'sofKriat',  l:'סוף ק"ש',    v:z.sofZmanShmaMGA},
      {key:'chatzot',   l:'חצות',        v:z.chatzot},
      {key:'mincha',    l:'מנחה גדולה', v:z.minchaGedola},
      {key:'sunset',    l:'שקיעה',       v:z.sunset},
      {key:'tzeit',     l:'צאת כוכבים', v:z.tzeit7083deg},
    ].filter(i=>i.v && (zc[i.key]!==undefined ? zc[i.key] : def[i.key]));
    const cnt=allItems.length;
    const tCls=cnt<=1?'c1':cnt===2?'c2':cnt===3?'c3':cnt===4?'c4':cnt===5?'c5':cnt===6?'c6':'c7';
    const tilesHtml=allItems.map((i,idx)=>{
      const t=new Date(i.v);
      // For 5 items: last item centered by spanning 2 cols
      const span=(cnt===5&&idx===4)?'grid-column:2/4;':'';
      return `<div class="ti" style="${span}"><div class="tl">${i.l}</div><div class="tv">${pad(t.getHours())}:${pad(t.getMinutes())}</div></div>`;
    }).join('');
    $('tContent').innerHTML=`<div class="tg ${tCls}">${tilesHtml}</div>`;
    // Shabbat
    const sh=await(await fetch(`https://www.hebcal.com/shabbat?cfg=json&latitude=${lat}&longitude=${lon}&tzid=Asia/Jerusalem&M=on&b=18`)).json();
    let ph='';
    if(sh.items){
      const para=sh.items.find(i=>i.category==='parashat');
      const spec=sh.items.find(i=>i.category==='holiday'&&i.subcat==='shabbat');
      const cnd=sh.items.find(i=>i.category==='candles');
      const hav=sh.items.find(i=>i.category==='havdalah');
      if(para) ph+=`<div class="pname">${para.hebrew||para.title}</div>`;
      if(spec) ph+=`<div class="pspec">${spec.hebrew||spec.title}</div>`;
      if(cnd){
        const ct=new Date(cnd.date);
        const diff=Math.round((new Date(cnd.date)-now)/86400000);
        const hd=await hebFor(ct);
        ph+=`<div class="crow"><span class="cico">🕯️</span><span class="clbl">כניסת שבת</span></div>`;
        ph+=`<div class="cdate" style="margin-bottom:3px;">${ct.getDate()}/${ct.getMonth()+1}/${String(ct.getFullYear()).slice(-2)}${hd?' · '+hd:''}</div>`;
        // Show date with "בעוד X ימים" inline
        const diffTxt = diff===0?'היום':diff===1?'מחר':`בעוד ${diff} ימים`;
        ph+=`<div class="cdate" style="font-size:.42rem;color:var(--d);margin-bottom:3px;">${diffTxt}</div>`;
        ph+=`<div class="g3">`;
        ph+=`<div class="sbox"><div class="slbl">כניסת שבת</div><div class="sval">${pad(ct.getHours())}:${pad(ct.getMinutes())}</div></div>`;
        if(hav){const ht=new Date(hav.date);const rt=new Date(ht.getTime()+50*60*1000);
          ph+=`<div class="sbox"><div class="slbl">הבדלה</div><div class="sval">${pad(ht.getHours())}:${pad(ht.getMinutes())}</div></div>`;
          ph+=`<div class="sbox"><div class="slbl">ר"ת</div><div class="sval">${pad(rt.getHours())}:${pad(rt.getMinutes())}</div></div>`;}
        ph+=`</div>`;
      }
    }
    $('pContent').innerHTML=ph||'<div class="ldmsg"><span>לא נמצא</span></div>';
    await fetchHagim(lat,lon,now);
  }catch(e){console.warn('hebcal',e);}
}

// HAGIM
const CHAG_T=['rosh hashana','yom kippur','sukkot','shmini atzeret','simchat torah','pesach','shavuot','passover'];
const hagHasT=t=>CHAG_T.some(c=>t.toLowerCase().includes(c));
const SHAB=['shabbat hagadol','shabbat shuva','shabbat chazon','shabbat nachamu','shabbat shekalim','shabbat zachor','shabbat parah','shabbat hachodesh'];
async function fetchHagim(lat,lon,now){
  try{
    const yr=now.getFullYear();
    const data=await(await fetch(`https://www.hebcal.com/hebcal?v=1&cfg=json&maj=on&min=on&mod=on&nx=on&year=${yr}&month=x&ss=on&mf=on&c=on&latitude=${lat}&longitude=${lon}&tzid=Asia/Jerusalem&b=18&M=on`)).json();
    const in30=new Date(now);in30.setDate(in30.getDate()+30);
    const all=data.items||[];
    const hols=all.filter(i=>{
      if(!i.date) return false;
      const d=new Date(i.date);if(d<now||d>in30) return false;
      if(i.category!=='holiday'&&i.category!=='roshchodesh') return false;
      const tl=(i.title||'').toLowerCase();
      if(SHAB.some(s=>tl.includes(s))) return false;
      if(i.subcat==='shabbat') return false;
      return true;
    });
    if(!hols.length){$('hagimCard').style.display='none';return;}
    const byDay={};
    hols.forEach(item=>{const d=new Date(item.date);const k=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());if(!byDay[k])byDay[k]={date:d,items:[]};byDay[k].items.push(item);});
    const nk=Object.keys(byDay).sort()[0];
    const{date:hd,items:di}=byDay[nk];
    const diff=Math.round((hd-now)/86400000);
    const when=diff===0?'היום':diff===1?'מחר':`בעוד ${diff} ימים`;
    const greg=hd.getDate()+'/'+(hd.getMonth()+1)+'/'+String(hd.getFullYear()).slice(-2);
    const heb=await hebFor(hd);
    const names=[...new Set(di.map(i=>i.hebrew||i.title))].join(' · ');
    let th='';
    const mc=di.find(i=>hagHasT(i.title||''));
    if(mc){
      const cnd=all.find(x=>x.category==='candles'&&Math.abs(new Date(x.date)-hd)<86400000*1.5);
      const hav=all.find(x=>x.category==='havdalah'&&Math.abs(new Date(x.date)-hd)<86400000*2.5);
      if(cnd||hav){
        th='<div class="g3">';
        if(cnd){const t=new Date(cnd.date);th+=`<div class="hbox"><div class="hlbl">כניסת חג</div><div class="hval">${pad(t.getHours())}:${pad(t.getMinutes())}</div></div>`;}
        if(hav){const t=new Date(hav.date);const rt=new Date(t.getTime()+50*60*1000);
          th+=`<div class="hbox"><div class="hlbl">הבדלה</div><div class="hval">${pad(t.getHours())}:${pad(t.getMinutes())}</div></div>`;
          th+=`<div class="hbox"><div class="hlbl">ר"ת</div><div class="hval">${pad(rt.getHours())}:${pad(rt.getMinutes())}</div></div>`;}
        th+='</div>';
      }
    }
    $('hagimCard').style.display='';
    $('hagimContent').innerHTML=`<div class="hname">${esc(names)}</div><div class="hwhen"><span style="color:var(--bl)">${when}</span> · ${greg}${heb?' · '+heb:''}</div>${th}`;
  }catch(e){$('hagimCard').style.display='none';}
}

// ── NEWS ────────────────────────────────────────────────
const FEEDS=[
  {n:'ynet',u:'https://www.ynet.co.il/Integration/StoryRss2.xml'},
  {n:'ישראל היום',u:'https://www.israelhayom.co.il/rss.xml'},
  {n:'וואלה',u:'https://rss.walla.co.il/feed/1'},
];
let tickRaf=null;
function startTicker(arr){
  const inner=$('tInner');if(!inner) return;
  inner.innerHTML=arr.map(h=>`<span style="padding:0 1.5vw;">◆</span><span>${esc(h)}</span>`).join('')+arr.map(h=>`<span style="padding:0 1.5vw;">◆</span><span>${esc(h)}</span>`).join('');
  void inner.offsetWidth;
  const tw=inner.scrollWidth/2,dur=Math.max(40,arr.join('').length*.35);
  let start=null;
  function step(ts){if(!start)start=ts;const pct=((ts-start)/1000/dur)%1;inner.style.transform=`translateX(-${pct*tw}px)`;tickRaf=requestAnimationFrame(step);}
  if(tickRaf) cancelAnimationFrame(tickRaf);
  tickRaf=requestAnimationFrame(step);
}
function parseTitles(txt,name){
  const re=/<title[^>]*>(?:<!\[CDATA\[)?\s*([\s\S]*?)\s*(?:\]\]>)?<\/title>/gi;
  const skip=new RegExp('^('+name+'|RSS|Feed|חדשות|ידיעות|ynet|walla)','i');
  const titles=[];let m;
  while((m=re.exec(txt))!==null){
    const t=m[1].replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#\d+;/g,'').replace(/\s+/g,' ').trim();
    if(t.length>8&&!skip.test(t)) titles.push(t);
  }
  return [...new Set(titles)].slice(0,10);
}
async function tryRss(url,name){
  for(const makeProxy of [u=>'https://api.allorigins.win/get?url='+encodeURIComponent(u),u=>'https://corsproxy.io/?'+encodeURIComponent(u)]){
    try{
      const ctrl=new AbortController();const tid=setTimeout(()=>ctrl.abort(),8000);
      const r=await fetch(makeProxy(url),{signal:ctrl.signal});clearTimeout(tid);
      if(!r.ok) continue;
      const ct=r.headers.get('content-type')||'';
      const txt=ct.includes('json')?(await r.json()).contents||'':(await r.text());
      const t=parseTitles(txt,name);if(t.length>=2) return t;
    }catch(e){}
  }
  return [];
}
async function fetchNews(){
  const s=safeGet(K.settings)||{};if(s.hideNews===true) return;
  let headlines=[];
  for(const f of FEEDS){
    const t=await tryRss(f.u,f.n);
    if(t.length>0) headlines.push(...t.map(h=>f.n+': '+h));
    if(headlines.length>=15) break;
  }
  startTicker(headlines.length>=2?headlines:['ברוכים הבאים לבניין שמעון פרס 3 · קריית מלאכי']);
}

// ── STATUS ──────────────────────────────────────────────
function setStatus(type,txt){
  const dot=$('sdot'),st=$('stxt');
  const c=type==='ok'?'var(--green)':type==='err'?'var(--red)':'#f59e0b';
  if(dot) dot.style.cssText=`width:5px;height:5px;border-radius:50%;background:${c};box-shadow:0 0 4px ${c};animation:pulse 2s ease-in-out infinite;`;
  if(st) st.textContent=txt;
}

let qIdx=0,qTimer=null,hfIdx=0,hfTimer=null;

function getQuotes(){
  const stored=safeGet('sp3_quotes');
  return (stored&&stored.length>0)?stored:DEFAULT_QUOTES;
}
function getHomefront(){
  const stored=safeGet('sp3_homefront');
  return (stored&&stored.length>0)?stored:DEFAULT_HOMEFRONT;
}

// Quote card — always visible, cycles every 10s
function renderQuote(){
  const quotes=getQuotes();
  const el=$('quoteContent');if(!el) return;
  if(!quotes.length){el.innerHTML='';return;}
  const q=quotes[qIdx%quotes.length];
  el.innerHTML=`
    <div style="font-size:clamp(.6rem,.76vw,.84rem);color:var(--t);line-height:1.6;font-style:italic;
      padding:2px 4px;">${esc(q.t)}</div>
    <div style="font-size:clamp(.46rem,.56vw,.62rem);color:var(--pl);margin-top:4px;">— ${esc(q.s)}</div>`;
}
function startQuotes(){
  renderQuote();
  if(qTimer) clearInterval(qTimer);
  if(getQuotes().length>1) qTimer=setInterval(()=>{qIdx++;renderQuote();},10000);
}

// Homefront card — shown only if setting enabled + images exist
function renderHFCard(){
  const w=safeGet(K.widgets)||{};
  const hfEnabled=w.hfEnabled!==false; // default true
  const imgs=getHomefront();
  const card=$('hfCard');if(!card) return;
  if(!hfEnabled||!imgs.length){card.style.display='none';return;}
  card.style.display='flex';
  const img=$('hfImg');
  if(img) img.src=imgs[hfIdx%imgs.length]||'';
  const dots=$('hfDots');
  if(dots) dots.innerHTML=imgs.map((_,i)=>`<div style="width:4px;height:4px;border-radius:50%;background:${i===hfIdx%imgs.length?'var(--bl)':'rgba(26,108,246,.3)'};"></div>`).join('');
}
function startHFCard(){
  renderHFCard();
  if(hfTimer) clearInterval(hfTimer);
  const imgs=getHomefront();
  if(imgs.length>1) hfTimer=setInterval(()=>{hfIdx++;renderHFCard();},8000);
}

function startBottomRight(){
  startQuotes();
  startHFCard();
}
